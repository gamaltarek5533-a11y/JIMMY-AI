<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#071a10"/>
      <stop offset="100%" stop-color="#020806"/>
    </radialGradient>

    <!-- J gradient -->
    <linearGradient id="jg" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#00ff87"/>
      <stop offset="60%" stop-color="#00e676"/>
      <stop offset="100%" stop-color="#00994d"/>
    </linearGradient>

    <!-- Ring gradient -->
    <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff87" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#00ff87" stop-opacity="0.2"/>
      <stop offset="70%" stop-color="#00ff87" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#00ff87" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="b1"/>
      <feGaussianBlur stdDeviation="7" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowStrong" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="glowSoft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>

  <!-- Outer dashed orbit ring -->
  <circle cx="100" cy="100" r="88"
    fill="none" stroke="#00ff87" stroke-width="0.6"
    stroke-dasharray="4 8" opacity="0.25"
    transform="rotate(-30 100 100)"/>

  <!-- Main ring - broken arc style -->
  <circle cx="100" cy="100" r="78"
    fill="none" stroke="url(#rg)" stroke-width="1.5"
    stroke-dasharray="180 68"
    stroke-linecap="round"
    transform="rotate(-100 100 100)"
    filter="url(#glowSoft)"/>

  <!-- Second arc opposite -->
  <circle cx="100" cy="100" r="78"
    fill="none" stroke="#00ff87" stroke-width="1"
    stroke-dasharray="50 298"
    stroke-linecap="round"
    transform="rotate(95 100 100)"
    opacity="0.4"/>

  <!-- Inner subtle ring -->
  <circle cx="100" cy="100" r="62"
    fill="none" stroke="#00ff87" stroke-width="0.5"
    opacity="0.08"/>

  <!-- Circuit nodes on ring -->
  <circle cx="100" cy="22" r="3" fill="#00ff87" opacity="0.7" filter="url(#glowSoft)"/>
  <circle cx="100" cy="22" r="1.2" fill="#00ff87"/>

  <circle cx="172" cy="61" r="2.5" fill="#00ff87" opacity="0.5" filter="url(#glowSoft)"/>
  <circle cx="28" cy="139" r="2.5" fill="#00ff87" opacity="0.5" filter="url(#glowSoft)"/>
  <circle cx="172" cy="139" r="2" fill="#00ff87" opacity="0.3"/>
  <circle cx="28" cy="61" r="2" fill="#00ff87" opacity="0.3"/>

  <!-- Tick marks on ring -->
  <line x1="100" y1="12" x2="100" y2="20" stroke="#00ff87" stroke-width="1.5" opacity="0.5"/>
  <line x1="100" y1="180" x2="100" y2="188" stroke="#00ff87" stroke-width="1.5" opacity="0.3"/>
  <line x1="12" y1="100" x2="20" y2="100" stroke="#00ff87" stroke-width="1.5" opacity="0.3"/>
  <line x1="180" y1="100" x2="188" y2="100" stroke="#00ff87" stroke-width="1.5" opacity="0.5"/>

  <!-- Glow blob center -->
  <circle cx="100" cy="100" r="35" fill="#00ff87" opacity="0.03" filter="url(#glowStrong)"/>

  <!-- J letter — thin elegant serif -->
  <text
    x="103" y="128"
    font-family="'Didot', 'Playfair Display', 'Cormorant Garamond', Georgia, serif"
    font-size="90"
    font-weight="300"
    font-style="italic"
    text-anchor="middle"
    fill="url(#jg)"
    filter="url(#glow)"
    letter-spacing="-4"
  >J</text>

  <!-- Animated pulse dot - top -->
  <circle cx="100" cy="22" r="5" fill="none" stroke="#00ff87" stroke-width="1" opacity="0">
    <animate attributeName="r" values="3;9;3" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Small decorative cross -->
  <line x1="155" y1="45" x2="165" y2="45" stroke="#00ff87" stroke-width="0.8" opacity="0.4"/>
  <line x1="160" y1="40" x2="160" y2="50" stroke="#00ff87" stroke-width="0.8" opacity="0.4"/>

  <line x1="35" y1="155" x2="45" y2="155" stroke="#00ff87" stroke-width="0.8" opacity="0.3"/>
  <line x1="40" y1="150" x2="40" y2="160" stroke="#00ff87" stroke-width="0.8" opacity="0.3"/>
</svg>
